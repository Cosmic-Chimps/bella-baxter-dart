name: bella_baxter
version: 0.1.1-preview.53
description: >-
  Official Dart SDK for Bella Baxter secret management.
  Pull secrets from Vault, AWS, Azure, and GCP via a single unified API.
  Supports HMAC auth, ZKE, and real-time polling.
repository: https://github.com/Cosmic-Chimps/bella-baxter-dart
issue_tracker: https://github.com/Cosmic-Chimps/bella-baxter-dart/issues
topics:
  - secrets
  - vault
  - configuration
  - security
  - dart

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  dio: '^5.7.0'
  one_of: '>=1.5.0 <2.0.0'
  one_of_serializer: '>=1.5.0 <2.0.0'
  built_value: '>=8.4.0 <9.0.0'
  built_collection: '>=5.1.1 <6.0.0'
  crypto: '>=3.0.0 <4.0.0'
  pointycastle: '>=3.7.0 <5.0.0'

dev_dependencies:
  built_value_generator: '>=8.6.0 <9.0.0'
  build_runner: any
  test: '^1.16.0'
