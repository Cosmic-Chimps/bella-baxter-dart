name: Publish Dart SDK to pub.dev

# pub.dev package: bella_baxter
# Install: dart pub add bella_baxter
#
# Authentication: pub.dev Trusted Publishing (OIDC — no secrets needed).
# One-time setup: register this repo on pub.dev → Automated publishing.
# First publish must be done manually once to claim the package name.

on:
  push:
    tags:
      - 'v*'

jobs:
  publish:
    runs-on: ubuntu-latest
    environment: pub-dev-bella-baxter
    permissions:
      contents: write    # create GitHub Release
      id-token: write    # pub.dev OIDC trusted publishing

    steps:
      - uses: actions/checkout@v6

      - uses: dart-lang/setup-dart@v1
        with:
          sdk: stable

      - name: Extract version from tag
        id: version
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Publishing bella_baxter $VERSION"

      - name: Verify VERSION file matches tag
        run: |
          FILE_VERSION="$(cat VERSION | tr -d '[:space:]')"
          TAG_VERSION="${{ steps.version.outputs.version }}"
          if [ "$FILE_VERSION" != "$TAG_VERSION" ]; then
            echo "::error::VERSION file has $FILE_VERSION but tag is $TAG_VERSION — run release-sdk.yml first"
            exit 1
          fi
          echo "✓ VERSION $FILE_VERSION matches tag $TAG_VERSION"

      - name: Set version in pubspec.yaml
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          sed -i "s/^version: .*/version: $VERSION/" pubspec.yaml
          echo "Updated pubspec.yaml version to $VERSION"

      - name: Generate Dart client from OpenAPI spec
        run: |
          docker run --rm \
            -v "${{ github.workspace }}/openapi.json:/openapi.json:ro" \
            -v "${{ github.workspace }}:/output" \
            openapitools/openapi-generator-cli:latest generate \
              -i /openapi.json \
              -g dart-dio \
              -o /output \
              --additional-properties=pubName=bella_baxter,nullSafe=true,browserClient=false \
              --skip-validate-spec 2>&1 | grep -v "^\[main\]" || true

      - name: Fix ownership after Docker (Docker runs as root, files must be runner-owned)
        run: sudo chown -R "$(id -u):$(id -g)" .

      - name: Fix generated Dart imports
        run: dart fix --apply lib/src/api/ || true

      - name: Install dependencies
        run: dart pub get

      - name: Run build_runner (generates serializers.g.dart and *.g.dart files)
        run: dart run build_runner build --delete-conflicting-outputs

      - name: Analyze
        run: dart analyze lib/

      - name: Publish to pub.dev
        run: dart pub publish --force

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          gh release create "v${VERSION}" \
            --title "bella_baxter v${VERSION}" \
            --notes "See [CHANGELOG.md](CHANGELOG.md) for details." \
            --verify-tag || true

  notify:
    runs-on: ubuntu-latest
    needs: [publish]
    if: always()
    steps:
      - uses: slackapi/slack-github-action@v3.0.1
        with:
          webhook: ${{ secrets.SLACK_WEBHOOK_URL }}
          webhook-type: webhook-trigger
          payload: |
            text: "${{ needs.publish.result == 'success' && '✅' || needs.publish.result == 'failure' && '❌' || '⚠️' }} *SDK Dart (bella_baxter) pub.dev publish ${{ github.ref_name }}*: ${{ needs.publish.result }}\n${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
